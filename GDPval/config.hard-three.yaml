run:
  output_dir: runs/hard-three
  dataset_cache: data/gdpval
  max_turns: 30
  task_timeout_seconds: 7200
  tool_timeout_seconds: 900
  warmup: true
  resume: true
  concurrency: 1
  task_ids: [3c19c6d1-672c-467a-8437-6fe21afb8eae]
  offset: 0
  limit: 1
  region: us-west
sandbox:
  backend: local
  image: null
  allow_local: true
tools:
  web_search: {provider: brave, api_key_env: BRAVE_API_KEY}
  web_fetch: {max_bytes: 50000}
providers:
  opus:
    type: anthropic
    enabled: true
    model: claude-opus-4-8
    api_key_env: ANTHROPIC_API_KEY
    endpoint: https://api.anthropic.com/v1/messages
    max_output_tokens: 32000
    max_retries: 5
  fable:
    type: anthropic
    enabled: true
    model: claude-fable-5
    api_key_env: ANTHROPIC_API_KEY
    endpoint: https://api.anthropic.com/v1/messages
    max_output_tokens: 32000
    max_retries: 5
  model_fast:
    type: openai
    enabled: true
    model: gpt-5.5-koffing-castor-kosmo-0527-test-ev3
    api_key_env: OPENAI_API_KEY
    endpoint: https://api.openai.com/v1/responses
    max_output_tokens: 32000
    max_retries: 5
