<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>Clarity CRM</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --surface-hover: #f1f5f9;
      --border: #e5e9f0;
      --border-strong: #d6dce6;
      --text: #172033;
      --muted: #667085;
      --subtle: #98a2b3;
      --primary: #635bff;
      --primary-dark: #4f46e5;
      --primary-soft: #eeedff;
      --green: #119c6b;
      --green-soft: #e7f8f1;
      --amber: #c77a08;
      --amber-soft: #fff5df;
      --red: #d14343;
      --red-soft: #ffeded;
      --blue: #2878d8;
      --blue-soft: #eaf3ff;
      --purple: #8553c9;
      --purple-soft: #f3ebff;
      --sidebar: #111827;
      --sidebar-muted: #98a2b3;
      --shadow-sm: 0 1px 2px rgba(16, 24, 40, .05);
      --shadow-md: 0 12px 30px rgba(15, 23, 42, .10);
      --shadow-lg: 0 24px 60px rgba(15, 23, 42, .18);
      --radius-sm: 8px;
      --radius: 12px;
      --radius-lg: 18px;
      --sidebar-width: 244px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button,
    select {
      cursor: pointer;
    }

    button {
      color: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    [hidden] {
      display: none !important;
    }

    :focus-visible {
      outline: 3px solid rgba(99, 91, 255, .24);
      outline-offset: 2px;
    }

    ::selection {
      background: rgba(99, 91, 255, .18);
    }

    .app-shell {
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 40;
      display: flex;
      width: var(--sidebar-width);
      flex-direction: column;
      overflow: auto;
      background:
        radial-gradient(circle at 10% 0%, rgba(99, 91, 255, .16), transparent 28%),
        var(--sidebar);
      color: #fff;
      transition: transform .25s ease;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      min-height: 74px;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 10px;
      background: linear-gradient(145deg, #8079ff, #5148ed);
      box-shadow: 0 8px 22px rgba(99, 91, 255, .34);
    }

    .brand-mark svg {
      width: 21px;
      height: 21px;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 750;
      letter-spacing: -.02em;
    }

    .workspace-card {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 17px 14px 8px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 11px;
      background: rgba(255, 255, 255, .045);
    }

    .workspace-icon {
      display: grid;
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      place-items: center;
      border-radius: 8px;
      background: rgba(255, 255, 255, .10);
      color: #c6c3ff;
      font-weight: 750;
    }

    .workspace-copy {
      min-width: 0;
      flex: 1;
    }

    .workspace-copy strong,
    .workspace-copy span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .workspace-copy strong {
      font-size: 13px;
      font-weight: 650;
    }

    .workspace-copy span {
      color: var(--sidebar-muted);
      font-size: 11px;
    }

    .side-label {
      margin: 18px 20px 7px;
      color: #667085;
      font-size: 10px;
      font-weight: 750;
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    .side-nav {
      display: grid;
      gap: 4px;
      padding: 0 10px;
    }

    .nav-item {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 11px;
      padding: 10px 11px;
      border: 0;
      border-radius: 9px;
      background: transparent;
      color: #aab2c0;
      text-align: left;
      transition: background .15s, color .15s;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, .06);
      color: #fff;
    }

    .nav-item.active {
      background: rgba(99, 91, 255, .18);
      color: #fff;
    }

    .nav-item.active .icon {
      color: #aaa5ff;
    }

    .nav-item .nav-text {
      flex: 1;
      font-weight: 560;
    }

    .nav-count {
      min-width: 23px;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .09);
      color: #c4c9d2;
      font-size: 11px;
      text-align: center;
    }

    .nav-item.active .nav-count {
      background: rgba(99, 91, 255, .35);
      color: #fff;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 14px;
    }

    .storage-state {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      color: #7f8998;
      font-size: 11px;
    }

    .storage-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #37c994;
      box-shadow: 0 0 0 3px rgba(55, 201, 148, .12);
    }

    .storage-dot.offline {
      background: #e9a23b;
      box-shadow: 0 0 0 3px rgba(233, 162, 59, .12);
    }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px;
      border-top: 1px solid rgba(255, 255, 255, .07);
    }

    .profile-copy {
      min-width: 0;
      flex: 1;
    }

    .profile-copy strong,
    .profile-copy span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile-copy strong {
      color: #f8fafc;
      font-size: 12px;
      font-weight: 650;
    }

    .profile-copy span {
      color: #7f8998;
      font-size: 11px;
    }

    .main-shell {
      min-height: 100vh;
      margin-left: var(--sidebar-width);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 25;
      display: flex;
      min-height: 74px;
      align-items: center;
      gap: 14px;
      padding: 11px 28px;
      border-bottom: 1px solid rgba(229, 233, 240, .9);
      background: rgba(255, 255, 255, .90);
      backdrop-filter: blur(14px);
    }

    .menu-button {
      display: none;
    }

    .page-heading {
      min-width: 0;
      flex: 1;
    }

    .page-heading h1 {
      margin: 0;
      overflow: hidden;
      font-size: 20px;
      font-weight: 750;
      letter-spacing: -.025em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-heading p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .header-actions {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 8px;
    }

    .content {
      width: 100%;
      max-width: 1640px;
      margin: 0 auto;
      padding: 24px 28px 40px;
    }

    .icon {
      display: inline-block;
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.8;
      vertical-align: middle;
    }

    .icon-sm {
      width: 15px;
      height: 15px;
    }

    .icon-lg {
      width: 22px;
      height: 22px;
    }

    .btn {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px 13px;
      border: 1px solid transparent;
      border-radius: 9px;
      background: transparent;
      font-weight: 630;
      line-height: 1;
      transition: transform .12s, border-color .15s, background .15s, box-shadow .15s;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 5px 13px rgba(99, 91, 255, .20);
    }

    .btn-primary:hover {
      border-color: var(--primary-dark);
      background: var(--primary-dark);
    }

    .btn-secondary {
      border-color: var(--border);
      background: var(--surface);
      color: #344054;
      box-shadow: var(--shadow-sm);
    }

    .btn-secondary:hover {
      border-color: var(--border-strong);
      background: var(--surface-soft);
    }

    .btn-danger {
      border-color: #f4c7c7;
      background: var(--red-soft);
      color: var(--red);
    }

    .btn-ghost {
      color: var(--muted);
    }

    .btn-ghost:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .icon-btn {
      display: inline-grid;
      width: 34px;
      height: 34px;
      padding: 0;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      transition: border-color .15s, color .15s, background .15s;
    }

    .icon-btn:hover {
      border-color: var(--border-strong);
      background: var(--surface-soft);
      color: var(--text);
    }

    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .kpi-card {
      position: relative;
      min-width: 0;
      overflow: hidden;
      padding: 18px;
    }

    .kpi-card::after {
      position: absolute;
      top: -34px;
      right: -35px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--kpi-glow, rgba(99, 91, 255, .06));
      content: "";
    }

    .kpi-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .kpi-icon {
      position: relative;
      z-index: 1;
      display: grid;
      width: 35px;
      height: 35px;
      place-items: center;
      border-radius: 10px;
      background: var(--icon-bg);
      color: var(--icon-color);
    }

    .kpi-value {
      margin-top: 13px;
      font-size: clamp(23px, 2.3vw, 30px);
      font-weight: 770;
      letter-spacing: -.04em;
      line-height: 1.1;
    }

    .kpi-detail {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 7px;
      color: var(--subtle);
      font-size: 11px;
    }

    .detail-positive {
      color: var(--green);
      font-weight: 650;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(280px, .7fr);
      gap: 18px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .card-header {
      display: flex;
      min-height: 58px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 17px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      min-width: 0;
    }

    .card-title h2,
    .card-title h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -.01em;
    }

    .card-title p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 11px;
    }

    .text-button {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border: 0;
      background: transparent;
      color: var(--primary);
      font-size: 12px;
      font-weight: 650;
    }

    .pipeline-overview {
      display: grid;
      gap: 17px;
      padding: 18px;
    }

    .overview-row {
      display: grid;
      grid-template-columns: 118px minmax(80px, 1fr) 80px;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      text-align: left;
    }

    .overview-row:hover .overview-label {
      color: var(--primary);
    }

    .overview-label {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 620;
      transition: color .15s;
    }

    .stage-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--stage-color);
      box-shadow: 0 0 0 3px var(--stage-soft);
    }

    .progress-track {
      height: 7px;
      overflow: hidden;
      border-radius: 99px;
      background: #edf0f4;
    }

    .progress-bar {
      min-width: 3px;
      height: 100%;
      border-radius: inherit;
      background: var(--stage-color);
    }

    .overview-value {
      color: #344054;
      font-size: 11px;
      font-weight: 650;
      text-align: right;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: #fbfcfe;
      color: var(--muted);
      font-size: 10px;
      font-weight: 720;
      letter-spacing: .04em;
      text-align: left;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      padding: 13px 16px;
      border-bottom: 1px solid #edf0f4;
      color: #344054;
      font-size: 12px;
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    tbody tr {
      transition: background .12s;
    }

    tbody tr:hover {
      background: #fcfcfd;
    }

    .primary-cell {
      min-width: 180px;
    }

    .cell-title {
      display: block;
      color: var(--text);
      font-size: 12px;
      font-weight: 660;
    }

    .cell-subtitle {
      display: block;
      max-width: 250px;
      margin-top: 2px;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .money {
      color: var(--text);
      font-variant-numeric: tabular-nums;
      font-weight: 670;
      white-space: nowrap;
    }

    .pill {
      display: inline-flex;
      min-height: 23px;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill::before {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: currentColor;
      content: "";
    }

    .stage-lead,
    .status-lead {
      background: #f0f2f5;
      color: #667085;
    }

    .stage-qualified {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .stage-proposal {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .stage-negotiation {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .stage-won,
    .status-customer {
      background: var(--green-soft);
      color: var(--green);
    }

    .status-active {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .activity-list {
      display: grid;
      padding: 4px 17px 9px;
    }

    .activity-item {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr);
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #edf0f4;
    }

    .activity-item:last-child {
      border-bottom: 0;
    }

    .activity-icon {
      display: grid;
      width: 32px;
      height: 32px;
      place-items: center;
      border-radius: 9px;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .activity-icon.contact {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .activity-copy {
      min-width: 0;
    }

    .activity-copy p {
      margin: 0;
      color: #344054;
      font-size: 11px;
      line-height: 1.45;
    }

    .activity-copy strong {
      color: var(--text);
      font-weight: 650;
    }

    .activity-copy time {
      display: block;
      margin-top: 3px;
      color: var(--subtle);
      font-size: 10px;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      padding: 16px;
    }

    .quick-action {
      display: grid;
      min-height: 84px;
      place-items: center;
      gap: 6px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-soft);
      color: #475467;
      font-size: 11px;
      font-weight: 650;
      text-align: center;
      transition: background .15s, border-color .15s, color .15s, transform .15s;
    }

    .quick-action:hover {
      transform: translateY(-2px);
      border-color: #cbc8ff;
      background: var(--primary-soft);
      color: var(--primary);
    }

    .toolbar-card {
      margin-bottom: 14px;
      padding: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .search-box {
      position: relative;
      min-width: 210px;
      flex: 1;
    }

    .search-box .icon {
      position: absolute;
      top: 50%;
      left: 11px;
      color: var(--subtle);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      height: 38px;
      padding: 8px 42px 8px 36px;
      border: 1px solid var(--border-strong);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }

    .search-input::placeholder {
      color: var(--subtle);
    }

    .search-input:focus,
    .filter-select:focus,
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 91, 255, .12);
    }

    .shortcut {
      position: absolute;
      top: 50%;
      right: 9px;
      padding: 1px 6px;
      border: 1px solid var(--border);
      border-bottom-width: 2px;
      border-radius: 5px;
      background: var(--surface-soft);
      color: var(--subtle);
      font-size: 10px;
      transform: translateY(-50%);
    }

    .filter-select {
      height: 38px;
      min-width: 140px;
      padding: 7px 32px 7px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 9px;
      background-color: #fff;
      color: #475467;
      outline: none;
    }

    .result-meta {
      margin: 0 3px 11px;
      color: var(--muted);
      font-size: 11px;
    }

    .pipeline-summary-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-bottom: 14px;
      overflow: hidden;
    }

    .pipeline-stat {
      padding: 14px 17px;
      border-right: 1px solid var(--border);
    }

    .pipeline-stat:last-child {
      border-right: 0;
    }

    .pipeline-stat span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      font-weight: 650;
      text-transform: uppercase;
    }

    .pipeline-stat strong {
      display: block;
      margin-top: 3px;
      font-size: 18px;
      letter-spacing: -.025em;
    }

    .pipeline-board-wrap {
      overflow-x: auto;
      padding: 2px 2px 15px;
    }

    .pipeline-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(274px, 1fr));
      gap: 12px;
      min-width: 1420px;
      align-items: start;
    }

    .pipeline-board.single {
      grid-template-columns: minmax(280px, 410px);
      min-width: 0;
    }

    .stage-column {
      min-height: 240px;
      padding: 9px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #eef1f5;
      transition: border-color .15s, background .15s;
    }

    .stage-column.drag-over {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .stage-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 3px 11px;
    }

    .stage-header h3 {
      margin: 0;
      font-size: 12px;
      font-weight: 720;
    }

    .stage-header .stage-count {
      display: grid;
      min-width: 20px;
      height: 20px;
      place-items: center;
      border-radius: 99px;
      background: rgba(255, 255, 255, .85);
      color: var(--muted);
      font-size: 10px;
    }

    .stage-total {

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && Array.isArray(parsed.contacts) && Array.isArray(parsed.deals)) {
              return parsed;
            }
          }
          const seeded = seedData();
          localStorage.setItem(STORAGE_KEY, JSON.stringify(seeded));
          return seeded;
        } catch (error) {
          storageAvailable = false;
          return seedData();
        }
      }

      function persist() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          storageAvailable = true;
          updateSidebar();
          return true;
        } catch (error) {
          storageAvailable = false;
          updateSidebar();
          toast("Changes are available for this session, but could not be saved locally.", "error");
          return false;
        }
      }

      function uid(prefix) {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return prefix + "-" + window.crypto.randomUUID();
        }
        return prefix + "-" + Date.now().toString(36) + Math.random().toString(36).slice(2);
      }

      function esc(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function selected(value, expected) {
        return value === expected ? " selected" : "";
      }

      function initials(name) {
        return String(name || "?")
          .trim()
          .split(/\s+/)
          .slice(0, 2)
          .map(part => part[0] || "")
          .join("")
          .toUpperCase();
      }

      function ownerClass(owner) {
        const index = OWNERS.indexOf(owner);
        return index >= 0 ? "a" + (index + 1) : "a4";
      }

      function formatCurrency(value, compact = false) {
        const amount = Number(value) || 0;
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD",
          maximumFractionDigits: 0,
          notation: compact ? "compact" : "standard"
        }).format(amount);
      }

      function parseLocalDate(value) {
        if (!value) return null;
        const parts = value.split("-").map(Number);
        if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
        return new Date(parts[0], parts[1] - 1, parts[2]);
      }

      function formatDate(value, options = { month: "short", day: "numeric", year: "numeric" }) {
        const date = value && value.includes && value.includes("T")
          ? new Date(value)
          : parseLocalDate(value);
        if (!date || Number.isNaN(date.getTime())) return "—";
        return new Intl.DateTimeFormat("en-US", options).format(date);
      }

      function relativeTime(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const diff = Date.now() - date.getTime();
        const days = Math.floor(diff / 86400000);
        if (days <= 0) return "Today";
        if (days === 1) return "Yesterday";
        if (days < 7) return `${days} days ago`;
        if (days < 30) return `${Math.floor(days / 7)} weeks ago`;
        return formatDate(value, { month: "short", day: "numeric" });
      }

      function dueInfo(value, isWon = false) {
        const due = parseLocalDate(value);
        if (!due) return { text: "No date", className: "" };
        if (isWon) return { text: formatDate(value, { month: "short", day: "numeric" }), className: "" };
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        due.setHours(0, 0, 0, 0);
        const days = Math.round((due - today) / 86400000);
        if (days < 0) return { text: `${Math.abs(days)}d overdue`, className: "overdue" };
        if (days === 0) return { text: "Due today", className: "due-soon" };
        if (days <= 7) return { text: `${days}d left`, className: "due-soon" };
        return { text: formatDate(value, { month: "short", day: "numeric" }), className: "" };
      }

      function getStage(id) {
        return STAGES.find(stage => stage.id === id) || STAGES[0];

      function getContact(id) {
        return state.contacts.find(contact => contact.id === id);

          : STAGES.filter(stage => stage.id === filters.dealStage);

        result.innerHTML = `
          <div class="pipeline-board-wrap">
            <div class="pipeline-board ${stagesToRender.length === 1 ? "single" : ""}">
              ${stagesToRender.map(stage => {
                const stageDeals = deals.filter(deal => deal.stage === stage.id);
                const stageValue = sumDeals(stageDeals);
                return `
                  <section class="stage-column" data-stage="${stage.id}" aria-label="${esc(stage.label)} stage">
                    <div class="stage-header">
                      <span class="stage-dot" style="--stage-color:${stage.color};--stage-soft:${stage.soft}"></span>
                      <h3>${esc(stage.label)}</h3>
                      <span class="stage-count">${stageDeals.length}</span>
                      <span class="stage-total">${formatCurrency(stageValue, true)}</span>
                    </div>
                    <div class="stage-cards">
                      ${stageDeals.length ? stageDeals.map(dealCard).join("") : `<div class="empty-stage">Drop a deal here<br>or add a new one</div>`}
                    </div>
                  </section>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }

      function renderContacts() {
        content.innerHTML = `
          <div class="card toolbar-card">
            <div class="toolbar">
              <label class="search-box" aria-label="Search contacts">
                ${icon("search", "icon-sm")}
                <input class="search-input" id="contactSearch" type="search" value="${esc(filters.contactSearch)}" placeholder="Search names, companies, roles, or email">
                <kbd class="shortcut">/</kbd>
              </label>
              <select class="filter-select" id="contactStatusFilter" aria-label="Filter contacts by status">
                <option value="all"${selected(filters.contactStatus, "all")}>All statuses</option>
                ${CONTACT_STATUSES.map(status => `<option value="${status.id}"${selected(filters.contactStatus, status.id)}>${esc(status.label)}</option>`).join("")}
              </select>
              <select class="filter-select" id="contactOwnerFilter" aria-label="Filter contacts by owner">
                <option value="all"${selected(filters.contactOwner, "all")}>All owners</option>
                ${OWNERS.map(owner => `<option value="${esc(owner)}"${selected(filters.contactOwner, owner)}>${esc(owner)}</option>`).join("")}
              </select>
              <select class="filter-select" id="contactSort" aria-label="Sort contacts">
                <option value="newest"${selected(filters.contactSort, "newest")}>Newest first</option>
                <option value="name"${selected(filters.contactSort, "name")}>Name A–Z</option>
                <option value="company"${selected(filters.contactSort, "company")}>Company A–Z</option>
              </select>
            </div>
          </div>
          <div class="result-meta" id="contactResultMeta"></div>
          <div id="contactResults"></div>
        `;
        updateContactResults();
      }

      function filteredContacts() {
        const query = filters.contactSearch.trim().toLowerCase();
        const contacts = state.contacts.filter(contact => {
          const haystack = [contact.name, contact.email, contact.company, contact.role, contact.owner].join(" ").toLowerCase();
          return (!query || haystack.includes(query))
            && (filters.contactStatus === "all" || contact.status === filters.contactStatus)
            && (filters.contactOwner === "all" || contact.owner === filters.contactOwner);
        });

        contacts.sort((a, b) => {
          if (filters.contactSort === "name") return a.name.localeCompare(b.name);
          if (filters.contactSort === "company") return a.company.localeCompare(b.company);
          return new Date(b.createdAt) - new Date(a.createdAt);
        });
        return contacts;
      }

      function updateContactResults() {
        const result = document.getElementById("contactResults");
        const meta = document.getElementById("contactResultMeta");
        if (!result) return;

        const contacts = filteredContacts();
        const hasFilters = filters.contactSearch || filters.contactStatus !== "all" || filters.contactOwner !== "all";
        meta.textContent = `${contacts.length} ${contacts.length === 1 ? "contact" : "contacts"} shown`;

        if (!state.contacts.length) {
          result.innerHTML = emptyState(
            "contacts",
            "No contacts yet",
            "Add your first contact to keep customer details organized.",
            "Add a contact",
            "new-contact"
          );
          return;
        }

        if (!contacts.length && hasFilters) {
          result.innerHTML = emptyState(
            "search",
            "No matching contacts",
            "Try a broader search or clear the current filters.",
            "Clear filters",
            "clear-contact-filters"
          );
          return;
        }

        result.innerHTML = `
          <article class="card contact-card">
            <div class="table-wrap">
              <table class="contact-table">
                <thead>
                  <tr>
                    <th>Contact</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Owner</th>
                    <th>Added</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  ${contacts.map(contact => {
                    const status = CONTACT_STATUSES.find(item => item.id === contact.status) || CONTACT_STATUSES[0];
                    return `
                      <tr>
                        <td class="primary-cell">
                          <div class="contact-summary">
                            <span class="contact-avatar">${initials(contact.name)}</span>
                            <span style="min-width:0">
                              <span class="cell-title">${esc(contact.name)}</span>
                              <a class="cell-subtitle" href="mailto:${encodeURIComponent(contact.email)}">${esc(contact.email)}</a>
                            </span>
                          </div>
                        </td>
                        <td>
                          <span class="cell-title">${esc(contact.company)}</span>
                          <span class="cell-subtitle">${esc(contact.role || "—")}</span>
                        </td>
                        <td><span class="pill status-${esc(contact.status)}">${esc(status.label)}</span></td>
                        <td>
                          <span class="owner-cell">
                            <span class="avatar small ${ownerClass(contact.owner)}">${initials(contact.owner)}</span>
                            ${esc(contact.owner)}
                          </span>
                        </td>
                        <td>${esc(formatDate(contact.createdAt, { month: "short", day: "numeric", year: "numeric" }))}</td>
                        <td>
                          <div class="row-actions">
                            <button class="icon-btn" data-action="edit-contact" data-id="${esc(contact.id)}" aria-label="Edit ${esc(contact.name)}">
                              ${icon("edit", "icon-sm")}
                            </button>
                            <button class="icon-btn" data-action="delete-contact" data-id="${esc(contact.id)}" aria-label="Delete ${esc(contact.name)}">
                              ${icon("trash", "icon-sm")}
                            </button>
                          </div>
                        </td>
                      </tr>
                    `;
                  }).join("")}
                </tbody>
              </table>
            </div>
          </article>
        `;
      }

      function emptyState(iconName, title, message, buttonLabel, action) {
        return `
          <div class="empty-state">
            <div class="empty-content">
              <span class="empty-icon">${icon(iconName, "icon-lg")}</span>
              <h3>${esc(title)}</h3>
              <p>${esc(message)}</p>
              <button class="btn btn-primary" data-action="${esc(action)}">
                ${action.startsWith("clear") ? icon("close", "icon-sm") : icon("plus", "icon-sm")}
                ${esc(buttonLabel)}
              </button>
            </div>
          </div>
        `;
      }

      function showModal(html, small = false) {
        lastFocusedElement = document.activeElement;
        modal.classList.toggle("modal-small", small);
        modalShell.innerHTML = html;
        modalBackdrop.hidden = false;
        document.body.style.overflow = "hidden";
        window.setTimeout(() => {
          const first = modal.querySelector("input, select, textarea, button");
          if (first) first.focus();
        }, 20);
      }

      function closeModal() {
        modalBackdrop.hidden = true;
        modalShell.innerHTML = "";
        document.body.style.overflow = "";
        if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
          lastFocusedElement.focus();
        }
      }

      function ownerOptions(value) {
        return OWNERS.map(owner => `<option value="${esc(owner)}"${selected(value, owner)}>${esc(owner)}</option>`).join("");
      }

      function statusOptions(value) {
        return CONTACT_STATUSES.map(status => `<option value="${status.id}"${selected(value, status.id)}>${esc(status.label)}</option>`).join("");
      }

      function stageOptions(value) {
        return STAGES.map(stage => `<option value="${stage.id}"${selected(value, stage.id)}>${esc(stage.label)}</option>`).join("");
      }

      function field(name, label, control, required = false, hint = "") {
        return `
          <div class="form-field ${name === "notes" ? "full" : ""}">
            <label class="form-label" for="${name}">${esc(label)}${required ? ' <span class="required-mark">*</span>' : ""}</label>
            ${control}
            ${hint ? `<div class="field-hint">${esc(hint)}</div>` : ""}
            <div class="field-error" id="err-${name}"></div>
          </div>
        `;
      }

      function openContactModal(id = null) {
        const existing = id ? state.contacts.find(contact => contact.id === id) : null;
        const contact = existing || {
          name: "",
          email: "",
          phone: "",
          company: "",
          role: "",
          status: "lead",
          owner: OWNERS[0]
        };

        showModal(`
          <form id="contactForm" novalidate>
            <div class="modal-header">
              <div class="modal-header-copy">
                <h2 id="modalTitle">${existing ? "Edit contact" : "Add a new contact"}</h2>
                <p>${existing ? "Update contact details and ownership." : "Capture the details your team needs to follow up."}</p>
              </div>
              <button type="button" class="modal-close" data-action="close-modal" aria-label="Close">${icon("close")}</button>
            </div>
            <div class="modal-body">
              <div class="form-grid">
                ${field("name", "Full name", `<input class="form-control" id="name" name="name" autocomplete="name" value="${esc(contact.name)}" placeholder="e.g. Jordan Taylor">`, true)}
                ${field("email", "Email address", `<input class="form-control" id="email" name="email" type="email" autocomplete="email" value="${esc(contact.email)}" placeholder="jordan@company.com">`, true)}
                ${field("company", "Company", `<input class="form-control" id="company" name="company" autocomplete="organization" value="${esc(contact.company)}" placeholder="Company name">`, true)}
                ${field("role", "Job title", `<input class="form-control" id="role" name="role" autocomplete="organization-title" value="${esc(contact.role)}" placeholder="e.g. Operations Director">`)}
                ${field("phone", "Phone", `<input class="form-control" id="phone" name="phone" autocomplete="tel" value="${esc(contact.phone)}" placeholder="+1 (555) 000-0000">`)}
                ${field("status", "Relationship status", `<select class="form-control" id="status" name="status">${statusOptions(contact.status)}</select>`, true)}
                ${field("owner", "Account owner", `<select class="form-control" id="owner" name="owner">${ownerOptions(contact.owner)}</select>`, true)}
              </div>
            </div>
            <div class="modal-footer">
              ${existing ? `<button type="button" class="btn btn-danger" data-action="delete-contact" data-id="${esc(existing.id)}">${icon("trash", "icon-sm")} Delete</button>` : ""}
              <span class="modal-footer-spacer"></span>
              <button type="button" class="btn btn-secondary" data-action="close-modal">Cancel</button>
              <button type="submit" class="btn btn-primary">${icon("save", "icon-sm")} ${existing ? "Save changes" : "Add contact"}</button>
            </div>
          </form>
        `);

        document.getElementById("contactForm").addEventListener("submit", event => {
          event.preventDefault();
          saveContact(existing?.id || null, event.currentTarget);
        });
      }

      function openDealModal(id = null) {
        const existing = id ? state.deals.find(deal => deal.id === id) : null;
        const deal = existing || {
          title: "",
          company: "",
          contactId: "",
          value: "",
          stage: "lead",
          owner: OWNERS[0],
          closeDate: dayISO(30),
          notes: ""
        };

        showModal(`
          <form id="dealForm" novalidate>
            <div class="modal-header">
              <div class="modal-header-copy">
                <h2 id="modalTitle">${existing ? "Edit deal" : "Create a new deal"}</h2>
                <p>${existing ? "Update the opportunity, value, or pipeline stage." : "Add a sales opportunity to your pipeline."}</p>
              </div>
              <button type="button" class="modal-close" data-action="close-modal" aria-label="Close">${icon("close")}</button>
            </div>
            <div class="modal-body">
              <div class="form-grid">
                ${field("title", "Deal name", `<input class="form-control" id="title" name="title" value="${esc(deal.title)}" placeholder="e.g. Annual platform renewal">`, true)}
                ${field("company", "Company", `<input class="form-control" id="company" name="company" value="${esc(deal.company)}" placeholder="Company name">`, true)}
                ${field("contactId", "Linked contact", `
                  <select class="form-control" id="contactId" name="contactId">
                    <option value="">No linked contact</option>
                    ${[...state.contacts].sort((a, b) => a.name.localeCompare(b.name)).map(contact =>
                      `<option value="${esc(contact.id)}"${selected(deal.contactId, contact.id)}>${esc(contact.name)} — ${esc(contact.company)}</option>`
                    ).join("")}
                  </select>
                `, false, state.contacts.length ? "Selecting a contact can fill the company name." : "Add contacts separately when you are ready.")}
                ${field("value", "Deal value (USD)", `<input class="form-control" id="value" name="value" type="number" min="1" step="100" value="${esc(deal.value)}" placeholder="25000">`, true)}
                ${field("stage", "Pipeline stage", `<select class="form-control" id="stage" name="stage">${stageOptions(deal.stage)}</select>`, true)}
                ${field("owner", "Deal owner", `<select class="form-control" id="owner" name="owner">${ownerOptions(deal.owner)}</select>`, true)}
                ${field("closeDate", "Expected close date", `<input class="form-control" id="closeDate" name="closeDate" type="date" value="${esc(deal.closeDate)}">`, true)}
                ${field("notes", "Notes", `<textarea class="form-control" id="notes" name="notes" placeholder="Context, next steps, or important details">${esc(deal.notes)}</textarea>`)}
              </div>
            </div>
            <div class="modal-footer">
              ${existing ? `<button type="button" class="btn btn-danger" data-action="delete-deal" data-id="${esc(existing.id)}">${icon("trash", "icon-sm")} Delete</button>` : ""}
              <span class="modal-footer-spacer"></span>
              <button type="button" class="btn btn-secondary" data-action="close-modal">Cancel</button>
              <button type="submit" class="btn btn-primary">${icon("save", "icon-sm")} ${existing ? "Save changes" : "Create deal"}</button>
            </div>
          </form>
        `);

        const form = document.getElementById("dealForm");
        const contactSelect = form.elements.contactId;
        contactSelect.addEventListener("change", () => {
          const contact = getContact(contactSelect.value);
          const companyInput = form.elements.company;
          if (contact && (!companyInput.value.trim() || !existing)) {
            companyInput.value = contact.company;
          }
        });

        form.addEventListener("submit", event => {
          event.preventDefault();
          saveDeal(existing?.id || null, event.currentTarget);
        });
      }

      function clearFormErrors(form) {
        form.querySelectorAll(".form-control").forEach(control => {
          control.classList.remove("is-invalid");
          control.removeAttribute("aria-invalid");
        });
        form.querySelectorAll(".field-error").forEach(error => error.textContent = "");
      }

      function showFormErrors(form, errors) {
        clearFormErrors(form);
        let firstInvalid = null;
        Object.entries(errors).forEach(([name, message]) => {
          const control = form.elements[name];
          const error = form.querySelector(`#err-${name}`);
          if (control) {
            control.classList.add("is-invalid");
            control.setAttribute("aria-invalid", "true");
            if (!firstInvalid) firstInvalid = control;
          }
          if (error) error.textContent = message;
        });
        if (firstInvalid) firstInvalid.focus();
      }

      function saveContact(id, form) {
        const data = Object.fromEntries(new FormData(form).entries());
        const errors = {};
        const name = data.name.trim();
        const email = data.email.trim().toLowerCase();
        const company = data.company.trim();

        if (name.length < 2) errors.name = "Enter the contact’s full name.";
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) errors.email = "Enter a valid email address.";
        const duplicate = state.contacts.find(contact => contact.email.toLowerCase() === email && contact.id !== id);
        if (duplicate) errors.email = "A contact with this email already exists.";
        if (!company) errors.company = "Company is required.";
        if (!CONTACT_STATUSES.some(status => status.id === data.status)) errors.status = "Select a valid status.";
        if (!OWNERS.includes(data.owner)) errors.owner = "Select a valid owner.";

        if (Object.keys(errors).length) {
          showFormErrors(form, errors);
          return;
        }

        const record = {
          id: id || uid("contact"),
          name,
          email,
          phone: data.phone.trim(),
          company,
          role: data.role.trim(),
          status: data.status,
          owner: data.owner,
          createdAt: id ? state.contacts.find(contact => contact.id === id).createdAt : new Date().toISOString()
        };

        if (id) {
          state.contacts = state.contacts.map(contact => contact.id === id ? record : contact);
        } else {
          state.contacts.unshift(record);
        }

        persist();
        closeModal();
        renderApp();
        toast(id ? "Contact updated successfully." : "Contact added successfully.");
      }

      function saveDeal(id, form) {
        const data = Object.fromEntries(new FormData(form).entries());
        const errors = {};
        const title = data.title.trim();
        const company = data.company.trim();
        const value = Number(data.value);

        if (title.length < 3) errors.title = "Enter a descriptive deal name.";
        if (!company) errors.company = "Company is required.";
        if (!Number.isFinite(value) || value <= 0) errors.value = "Enter a deal value greater than zero.";
        if (value > 1000000000) errors.value = "Deal value must be below $1 billion.";
        if (!STAGES.some(stage => stage.id === data.stage)) errors.stage = "Select a valid stage.";
        if (!OWNERS.includes(data.owner)) errors.owner = "Select a valid owner.";
        if (!data.closeDate || !parseLocalDate(data.closeDate)) errors.closeDate = "Choose an expected close date.";
        if (data.contactId && !getContact(data.contactId)) errors.contactId = "The selected contact no longer exists.";

        if (Object.keys(errors).length) {
          showFormErrors(form, errors);
          return;
        }

        const record = {
          id: id || uid("deal"),
          title,
          company,
          contactId: data.contactId || "",
          value: Math.round(value),
          stage: data.stage,
          owner: data.owner,
          closeDate: data.closeDate,
          notes: data.notes.trim(),
          createdAt: id ? state.deals.find(deal => deal.id === id).createdAt : new Date().toISOString()
        };

        if (id) {
          state.deals = state.deals.map(deal => deal.id === id ? record : deal);
        } else {
          state.deals.unshift(record);
        }

        persist();
        closeModal();
        renderApp();
        toast(id ? "Deal updated successfully." : "Deal created successfully.");
      }

      function openDeleteConfirm(type, id) {
        const record = type === "contact"
          ? state.contacts.find(contact => contact.id === id)
          : state.deals.find(deal => deal.id === id);
        if (!record) return;

        const label = type === "contact" ? record.name : record.title;
        const detail = type === "contact"
          ? "This removes the contact. Linked deals will remain but will no longer reference this person."
          : "This permanently removes the opportunity from your pipeline.";

        showModal(`
          <div class="confirm-body">
            <span class="warning-icon">${icon("alert", "icon-lg")}</span>
            <h2 id="modalTitle">Delete ${type}?</h2>
            <p>Are you sure you want to delete <strong>${esc(label)}</strong>? ${esc(detail)}</p>
          </div>
          <div class="confirm-actions">
            <button class="btn btn-secondary" data-action="close-modal">Cancel</button>
            <button class="btn btn-danger" id="confirmDeleteButton">${icon("trash", "icon-sm")} Delete permanently</button>
          </div>
        `, true);

        document.getElementById("confirmDeleteButton").addEventListener("click", () => {
          if (type === "contact") {
            state.contacts = state.contacts.filter(contact => contact.id !== id);
            state.deals = state.deals.map(deal => deal.contactId === id ? { ...deal, contactId: "" } : deal);
          } else {
            state.deals = state.deals.filter(deal => deal.id !== id);
          }
          persist();
          closeModal();
          renderApp();
          toast(`${type === "contact" ? "Contact" : "Deal"} deleted.`);
        });
      }

      function toast(message, type = "success") {
        const region = document.getElementById("toastRegion");
        const item = document.createElement("div");
        item.className = `toast ${type === "error" ? "error" : ""}`;
        item.innerHTML = `
          <span class="toast-icon">${icon(type === "error" ? "alert" : "check", "icon-sm")}</span>
          <span>${esc(message)}</span>
          <button aria-label="Dismiss notification">${icon("close", "icon-sm")}</button>
        `;
        const dismiss = () => item.remove();
        item.querySelector("button").addEventListener("click", dismiss);
        region.appendChild(item);
        window.setTimeout(dismiss, 4200);
      }

      function navigate(view) {
        if (!["dashboard", "pipeline", "contacts"].includes(view)) return;
        currentView = view;
        document.body.classList.remove("sidebar-open");
        renderApp();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      document.addEventListener("click", event => {
        const nav = event.target.closest("[data-nav]");
        if (nav) {
          navigate(nav.dataset.nav);
          return;
        }

        const actionElement = event.target.closest("[data-action]");
        if (!actionElement) return;

        const action = actionElement.dataset.action;
        const id = actionElement.dataset.id;

        if (action === "new-contact") openContactModal();
        if (action === "new-deal") openDealModal();
        if (action === "edit-contact") openContactModal(id);
        if (action === "edit-deal") openDealModal(id);
        if (action === "delete-contact") openDeleteConfirm("contact", id);
        if (action === "delete-deal") openDeleteConfirm("deal", id);
        if (action === "close-modal") closeModal();

        if (action === "clear-deal-filters") {
          filters.dealSearch = "";
          filters.dealOwner = "all";
          filters.dealStage = "all";
          renderPipeline();
        }

        if (action === "clear-contact-filters") {
          filters.contactSearch = "";
          filters.contactOwner = "all";
          filters.contactStatus = "all";
          renderContacts();
        }

        if (action === "go-stage") {
          filters.dealStage = actionElement.dataset.stage || "all";
          navigate("pipeline");
        }
      });

      document.addEventListener("input", event => {
        if (event.target.id === "dealSearch") {
          filters.dealSearch = event.target.value;
          updatePipelineResults();
        }
        if (event.target.id === "contactSearch") {
          filters.contactSearch = event.target.value;
          updateContactResults();
        }
        if (event.target.classList.contains("is-invalid")) {
          event.target.classList.remove("is-invalid");
          event.target.removeAttribute("aria-invalid");
          const error = event.target.form?.querySelector(`#err-${event.target.name}`);
          if (error) error.textContent = "";
        }
      });

      document.addEventListener("change", event => {
        if (event.target.id === "dealStageFilter") {
          filters.dealStage = event.target.value;
          updatePipelineResults();
        }
        if (event.target.id === "dealOwnerFilter") {
          filters.dealOwner = event.target.value;
          updatePipelineResults();
        }
        if (event.target.id === "contactStatusFilter") {
          filters.contactStatus = event.target.value;
          updateContactResults();
        }
        if (event.target.id === "contactOwnerFilter") {
          filters.contactOwner = event.target.value;
          updateContactResults();
        }
        if (event.target.id === "contactSort") {
          filters.contactSort = event.target.value;
          updateContactResults();
        }
      });

      content.addEventListener("dragstart", event => {
        const card = event.target.closest(".deal-card");
        if (!card) return;
        card.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", card.dataset.dealId);
      });

      content.addEventListener("dragend", event => {
        const card = event.target.closest(".deal-card");
        if (card) card.classList.remove("dragging");
        content.querySelectorAll(".stage-column").forEach(column => column.classList.remove("drag-over"));
      });

      content.addEventListener("dragover", event => {
        const column = event.target.closest(".stage-column");
        if (!column) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "move";
        content.querySelectorAll(".stage-column").forEach(item => item.classList.toggle("drag-over", item === column));
      });

      content.addEventListener("dragleave", event => {
        const column = event.target.closest(".stage-column");
        if (column && !column.contains(event.relatedTarget)) column.classList.remove("drag-over");
      });

      content.addEventListener("drop", event => {
        const column = event.target.closest(".stage-column");
        if (!column) return;
        event.preventDefault();
        const id = event.dataTransfer.getData("text/plain");
        const deal = state.deals.find(item => item.id === id);
        if (!deal || deal.stage === column.dataset.stage) {
          column.classList.remove("drag-over");
          return;
        }
        const oldStage = getStage(deal.stage).label;
        deal.stage = column.dataset.stage;
        persist();
        updatePipelineResults();
        updateSidebar();
        toast(`${deal.title} moved from ${oldStage} to ${getStage(deal.stage).label}.`);
      });

      menuButton.innerHTML = icon("menu");
      menuButton.addEventListener("click", () => document.body.classList.add("sidebar-open"));
      sidebarBackdrop.addEventListener("click", () => document.body.classList.remove("sidebar-open"));

      modalBackdrop.addEventListener("click", event => {
        if (event.target === modalBackdrop) closeModal();
      });

      document.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          if (!modalBackdrop.hidden) closeModal();
          else document.body.classList.remove("sidebar-open");
        }

        if (event.key === "/" && !event.ctrlKey && !event.metaKey && !event.altKey) {
          const activeTag = document.activeElement?.tagName;
          if (["INPUT", "TEXTAREA", "SELECT"].includes(activeTag)) return;
          const search = currentView === "pipeline"
            ? document.getElementById("dealSearch")
            : currentView === "contacts"
              ? document.getElementById("contactSearch")
              : null;
          if (search) {
            event.preventDefault();
            search.focus();
          }
        }

        if (event.key === "Tab" && !modalBackdrop.hidden) {
          const focusable = [...modal.querySelectorAll('button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [href]')]
            .filter(item => item.offsetParent !== null);
          if (!focusable.length) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        }
      });

      window.addEventListener("storage", event => {
        if (event.key !== STORAGE_KEY || !event.newValue) return;
        try {
          const parsed = JSON.parse(event.newValue);
          if (parsed && Array.isArray(parsed.contacts) && Array.isArray(parsed.deals)) {
            state = parsed;
            renderApp();
            toast("CRM data was updated in another tab.");
          }
        } catch (error) {
          // Ignore malformed cross-tab data.
        }
      });

      renderApp();
    })();
  </script>
</body>
</html>
