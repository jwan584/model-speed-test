<body>

    <div class="scanlines"></div>

    <div id="game-wrapper">
        <!-- Sidebar Info -->
        <div class="sidebar">
            <div class="panel">
                <h3>Score</h3>
                <div id="score" class="value">0</div>
            </div>
            <div class="panel">
                <h3>Level</h3>
                <div id="level" class="value">1</div>
            </div>
            <div class="panel">
                <h3>Next</h3>
                <canvas id="next-piece-canvas" width="80" height="80"></canvas>
            </div>
            <div class="panel controls-info">
                <h3>Controls</h3>
                <div><span class="key">←</span> <span class="key">→</span> Move</div>
                <div><span class="key">↑</span> Rotate</div>
                <div><span class="key">↓</span> Soft Drop</div>
                <div><span class="key">Space</span> Hard Drop</div>
                <div><span class="key">P</span> Pause</div>
            </div>
        </div>

        <!-- Main Game Area -->
        <div class="canvas-container">
            <canvas id="tetris" width="240" height="400"></canvas>
            
            <div id="overlay">
                <h1>NEON TETRIS</h1>
                <p id="final-score" style="display:none; font-size: 1.2rem; color: #aaa; margin-bottom: 20px;">Score: 0</p>
                <button id="start-btn" class="btn-main">Start Game</button>
            </div>
        </div>
    </div>

    <!-- Mobile Controls (Bottom) -->
    <div id="mobile-controls">
        <div class="m-btn" data-key="left">←</div>
        <div class="m-btn" data-key="rotate">↻</div>
        <div class="m-btn" data-key="down">↓</div>
        <div class="m-btn" data-key="right">→</div>
        <div class="m-btn m-btn-large" style="grid-column: span 2; border-radius: 30px;" data-key="drop">DROP</div>
    </div>

<script>
    /**
     * Neon Tetris - High Performance Canvas Implementation
     * Core Features:
     * - Matrix based grid
     * - Wall Kicks (Simple)
     * - Ghost Piece
     * - Particle/Flash effects
     * - Responsive scaling
     */

    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next-piece-canvas');
    const nextContext = nextCanvas.getContext('2d');

    // Multiply scale for crisp rendering
    context.scale(20, 20);
    nextContext.scale(20, 20);

    // --- Constants & Config ---
    const COLS = 12;
    const ROWS = 20;
    
    // Colors palette (Tailwind-ish inspired neon)
    const COLORS = [
        null,
        '#FF0D72', // T - Purple/Pink
        '#0DC2FF', // I - Cyan
        '#0DFF72', // S - Green
        '#F538FF', // Z - Magenta
        '#FF8E0D', // L - Orange
        '#FFE138', // O - Yellow
        '#3877FF', // J - Blue
    ];

    // Tetromino Definitions
    const PIECES = 'ILJOTSZ';
    
    // --- Game State ---
    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
        score: 0,
        level: 1,
        lines: 0,
        next: null
    };

    const arena = createMatrix(COLS, ROWS);

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let isPaused = false;
    let isGameOver = false;
    let animationId = null;

    // --- DOM Elements ---
    const scoreElement = document.getElementById('score');
    const levelElement = document.getElementById('level');
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('overlay');
    const finalScoreEl = document.getElementById('final-score');
    const h1Title = document.querySelector('#overlay h1');

    // --- Helper Functions ---

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) {
            matrix.push(new Array(w).fill(0));
        }
        return matrix;
    }

    function createPiece(type) {
        if (type === 'I') {
            return [
                [0, 1, 0, 0],
                [0, 1, 0, 0],
                [0, 1, 0, 0],
                [0, 1, 0, 0],
            ];
        } else if (type === 'L') {
            return [
                [0, 2, 0],
                [0, 2, 0],
                [0, 2, 2],
            ];
        } else if (type === 'J') {
            return [
                [0, 7, 0],
                [0, 7, 0],
                [7, 7, 0],
            ];
        } else if (type === 'O') {
            return [
                [6, 6],
                [6, 6],
            ];
        } else if (type === 'Z') {
            return [
                [4, 4, 0],
                [0, 4, 4],
                [0, 0, 0],
            ];
        } else if (type === 'S') {
            return [
                [0, 3, 3],
                [3, 3, 0],
                [0, 0, 0],
            ];
        } else if (type === 'T') {
            return [
                [0, 5, 0],
                [5, 5, 5],
                [0, 0, 0],
            ];
        }
    }

    function drawMatrix(matrix, offset, ctx = context, isGhost = false) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    const xPos = x + offset.x;
                    const yPos = y + offset.y;
                    
                    // Neon Glow Effect
                    ctx.fillStyle = isGhost ? 'rgba(255, 255, 255, 0.1)' : COLORS[value];
                    
                    if (isGhost) {
                        // Draw outline for ghost
                        ctx.strokeStyle = COLORS[value];
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(xPos, yPos, 1, 1);
                        
                        // Small center dot
                        ctx.fillStyle = COLORS[value];
                        ctx.globalAlpha = 0.3;
                        ctx.fillRect(xPos + 0.4, yPos + 0.4, 0.2, 0.2);
                        ctx.globalAlpha = 1.0;
                    } else {
                        // Fill block
                        ctx.fillRect(xPos, yPos, 1, 1);
                        
                        // Inner bevel/highlight for 3D look
                        ctx.fillStyle = 'rgba(255,255,255,0.4)';
                        ctx.fillRect(xPos, yPos, 1, 0.1); // Top light
                        ctx.fillRect(xPos, yPos, 0.1, 1); // Left light
                        
                        ctx.fillStyle = 'rgba(0,0,0,0.2)';
                        ctx.fillRect(xPos + 0.9, yPos, 0.1, 1); // Right shadow
                        ctx.fillRect(xPos, yPos + 0.9, 1, 0.1); // Bottom shadow
                        
                        // Glow center
                        ctx.shadowBlur = 0; 
                    }
                }
            });
        });
    }

    function drawGhost() {
        if (!player.matrix) return;
        
        const ghostPos = { ...player.pos };
        while (!collide(arena, { ...player, pos: ghostPos })) {
            ghostPos.y++;
        }
        ghostPos.y--; // Step back one
        
        drawMatrix(player.matrix, ghostPos, context, true);
    }

    function draw() {
        // Clear screen
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, {x: 0, y: 0});
        
        if (!isGameOver && !isPaused) {
            drawGhost();
            drawMatrix(player.matrix, player.pos);
        }
    }

    function drawNext() {
        nextContext.fillStyle = '#000'; // transparentish
        nextContext.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        
        if (player.next) {
            // Center calculation
            const xOffset = (4 - player.next[0].length) / 2;
            const yOffset = (4 - player.next.length) / 2;
            drawMatrix(player.next, {x: xOffset, y: yOffset}, nextContext);
        }
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) {
            matrix.forEach(row => row.reverse());
        } else {
            matrix.reverse();
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        // Wall kick logic
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir); // Rotate back if fail
                player.pos.x = pos;
                return;
            }
        }
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function playerReset() {
        if (player.next === null) {
            player.next = createPiece(PIECES[PIECES.length * Math.random() | 0]);
        }
        player.matrix = player.next;
        player.next = createPiece(PIECES[PIECES.length * Math.random() | 0]);
        
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

        // Instant Game Over Check
        if (collide(arena, player)) {
            gameOver();
        }
        
        drawNext();
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }
    
    function playerHardDrop() {
        while (!collide(arena, player)) {
            player.pos.y++;
        }
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
        updateScore();
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        }
    }

    function arenaSweep() {
        let rowCount = 0;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) {
                    continue outer;
                }
            }
            
            // Remove row
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            rowCount++;
        }

        if (rowCount > 0) {
            player.score += rowCount * 10 * player.level;
            player.lines += rowCount;
            
            // Level up every 10 lines
            player.level = Math.floor(player.lines / 10) + 1;
            // Speed up
            dropInterval = Math.max(100, 1000 - (player.level - 1) * 100); 

            // Visual feedback (Screen flash)
            canvas.style.boxShadow = `0 0 50px ${COLORS[player.matrix[0].find(v=>v!==0)] || '#fff'}`;
            setTimeout(() => {
                canvas.style.boxShadow = '0 0 15px rgba(0,0,0,0.8)';
            }, 100);
        }
    }

    function updateScore() {
        scoreElement.innerText = player.score;
        levelElement.innerText = player.level;
    }

    function gameOver() {
        isGameOver = true;
        cancelAnimationFrame(animationId);
        h1Title.innerText = "GAME OVER";
        h1Title.style.textShadow = "4px 4px 0px #ff0000";
        finalScoreEl.style.display = 'block';
        finalScoreEl.innerText = `Final Score: ${player.score}`;
        startBtn.innerText = 'Try Again';
        overlay.classList.remove('hidden');
    }

    function resetGame() {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        player.lines = 0;
        player.level = 1;
        dropInterval = 1000;
        player.next = null; // force new
        updateScore();
        playerReset();
        
        isGameOver = false;
        isPaused = false;
        overlay.classList.add('hidden');
        lastTime = 0;
        dropCounter = 0;
        update();
    }

    function togglePause() {
        if (isGameOver) return;
        isPaused = !isPaused;
        if (isPaused) {
            h1Title.innerText = "PAUSED";
            h1Title.style.textShadow = "4px 4px 0px #ffff00";
            startBtn.innerText = "Resume";
            overlay.classList.remove('hidden');
            cancelAnimationFrame(animationId);
        } else {
            overlay.classList.add('hidden');
            lastTime = performance.now(); // prevent jump
            update();
        }
    }

    function update(time = 0) {
        if (isPaused || isGameOver) return;

        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
            playerDrop();
        }

        draw();
        animationId = requestAnimationFrame(update);
    }

    // --- Input Handling ---

    document.addEventListener('keydown', event => {
        if (isGameOver) return;
        
        // Map keys via switch/case for clarity
        switch(event.keyCode) {
            case 37: // Left
                if(!isPaused) playerMove(-1);
                break;
            case 39: // Right
                if(!isPaused) playerMove(1);
                break;
            case 40: // Down
                if(!isPaused) playerDrop();
                break;
            case 38: // Up (Rotate)
                if(!isPaused) playerRotate(1);
                break;
            case 32: // Space (Hard Drop)
                if(!isPaused) playerHardDrop();
                break;
            case 80: // P (Pause)
                togglePause();
                break;
        }
    });

    // Mobile / Button Controls
    const buttons = document.querySelectorAll('.m-btn');
    
    // Helper to handle touch to prevent lag
    function handleInput(action) {
        if (isGameOver) return;
        if (overlay.classList.contains('hidden') || action === 'restart') {
            switch(action) {
                case 'left': playerMove(-1); break;
                case 'right': playerMove(1); break;
                case 'rotate': playerRotate(1); break;
                case 'down': playerDrop(); break;
                case 'drop': playerHardDrop(); break;
            }
        }
    }

    buttons.forEach(btn => {
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault(); // prevent scroll/zoom
            handleInput(btn.dataset.key);
            btn.style.background = 'rgba(0, 243, 255, 0.4)';
        }, {passive: false});

        btn.addEventListener('touchend', (e) => {
            e.preventDefault();
            btn.style.background = 'rgba(255, 255, 255, 0.1)';
        });
        
        // Mouse fallback for testing on desktop
        btn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            handleInput(btn.dataset.key);
        });
    });

    // Start Button Logic
    startBtn.addEventListener('click', () => {
        if (isPaused) {
            togglePause();
        } else {
            resetGame();
        }
    });

    // Initial render (blank)
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);

</script>
</body>
</html>
